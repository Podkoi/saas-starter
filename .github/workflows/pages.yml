name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create CNAME file (optional)
        run: |
          if [ -n "${{ secrets.PAGES_CUSTOM_DOMAIN }}" ]; then
            mkdir -p ./dist
            echo "${{ secrets.PAGES_CUSTOM_DOMAIN }}" > ./dist/CNAME
            echo "Wrote CNAME to ./dist/CNAME"
          else
            echo "No PAGES_CUSTOM_DOMAIN secret set; skipping CNAME"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "Deploy to GitHub Pages: ${{ github.sha }}"
